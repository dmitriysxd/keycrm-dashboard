<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYCRM · Аналітика</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #07070f;
    --s1:       #0f0f1a;
    --s2:       #16162a;
    --s3:       #1e1e35;
    --border:   rgba(255,255,255,0.06);
    --gold:     #c9a96e;
    --gold2:    rgba(201,169,110,0.15);
    --purple:   #7c6ef5;
    --purple2:  rgba(124,110,245,0.15);
    --green:    #5cb88a;
    --red:      #e06060;
    --text:     #e8e4dc;
    --muted:    rgba(232,228,220,0.45);
    --muted2:   rgba(232,228,220,0.2);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--s1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0 20px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .logo {
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .logo-mark {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.3px;
  }
  .logo-mark span { color: var(--text); }
  .logo-sub { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text); background: var(--s2); }
  .nav-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--gold2); }
  .nav-icon { font-size: 14px; width: 18px; text-align: center; }

  .sidebar-bottom {
    margin-top: auto;
    padding: 16px 24px 0;
    border-top: 1px solid var(--border);
  }
  .update-info { font-size: 10px; color: var(--muted); line-height: 1.6; }
  .update-info span { color: var(--gold); }

  /* ── Main ── */
  .main {
    flex: 1;
    padding: 32px 36px;
    overflow: auto;
  }

  .page { display: none; }
  .page.active { display: block; }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .page-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .page-sub { color: var(--muted); font-size: 12px; margin-top: 5px; }

  /* Period selector */
  .period-group { display: flex; gap: 4px; }
  .pbtn {
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pbtn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .pbtn.active { background: var(--gold2); border-color: rgba(201,169,110,0.35); color: var(--gold); }

  /* Refresh btn */
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { color: var(--gold); border-color: rgba(201,169,110,0.3); }
  .refresh-btn.loading .ri { animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── KPI ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .kpi:hover { transform: translateY(-2px); }
  .kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); }
  .kpi-accent.purple { background: var(--purple); }
  .kpi-accent.green  { background: var(--green); }
  .kpi-accent.red    { background: var(--red); }
  .kpi-label { font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .kpi-val { font-family: 'Unbounded', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── Charts grid ── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .grid-1 { margin-bottom: 16px; }

  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
  }

  /* ── Card ── */
  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
  }
  .card-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold); flex-shrink: 0;
  }
  .card-title .dot.p { background: var(--purple); }
  .card-title .dot.g { background: var(--green); }

  .chart-wrap { position: relative; }
  .chart-wrap canvas { max-height: 260px; }

  /* ── Bar rows ── */
  .bar-list { display: flex; flex-direction: column; gap: 11px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-name { width: 120px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; height: 5px; background: var(--s3); border-radius: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .bar-fill.gold   { background: linear-gradient(90deg, var(--gold), rgba(201,169,110,0.4)); }
  .bar-fill.purple { background: linear-gradient(90deg, var(--purple), rgba(124,110,245,0.4)); }
  .bar-fill.green  { background: linear-gradient(90deg, var(--green), rgba(92,184,138,0.4)); }
  .bar-val { font-size: 11px; color: var(--muted); width: 44px; text-align: right; flex-shrink: 0; }

  /* ── Price boxes ── */
  .price-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  @media (max-width: 700px) { .price-grid { grid-template-columns: repeat(3,1fr); } }
  .price-box {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    transition: transform 0.2s;
  }
  .price-box:hover { transform: scale(1.03); }
  .price-range { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .price-count { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; }
  .price-pct   { font-size: 10px; color: var(--gold); margin-top: 3px; }

  /* ── Stock table ── */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th {
    font-size: 10px; letter-spacing: 0.7px; text-transform: uppercase;
    color: var(--muted); text-align: left;
    padding: 0 12px 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .tbl td {
    padding: 9px 12px 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
    vertical-align: middle;
  }
  .tbl tr:last-child td { border-bottom: none; }
  .pill {
    display: inline-block; padding: 2px 8px;
    border-radius: 20px; font-size: 10px; font-weight: 500;
  }
  .pill.r { background: rgba(224,96,96,0.12); color: var(--red); }
  .pill.g { background: rgba(92,184,138,0.12); color: var(--green); }
  .pill.y { background: rgba(201,169,110,0.12); color: var(--gold); }
  .pill.b { background: rgba(124,110,245,0.15); color: var(--purple); }

  /* ── SKU table (sortable, sticky header, filters) ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 14px;
  }
  .filter-bar input[type="search"],
  .filter-bar select {
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    outline: none;
    min-width: 160px;
  }
  .filter-bar input[type="search"]:focus,
  .filter-bar select:focus { border-color: rgba(201,169,110,0.4); }
  .filter-bar .spacer { flex: 1; }
  .filter-bar button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }
  .filter-bar button:hover { color: var(--gold); border-color: rgba(201,169,110,0.3); }

  .tbl-scroll {
    max-height: 70vh;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--s1);
  }
  .tbl-scroll table { width: 100%; border-collapse: collapse; }
  .tbl-scroll thead th {
    position: sticky; top: 0;
    background: var(--s2);
    padding: 10px 12px;
    font-size: 10px; letter-spacing: 0.7px; text-transform: uppercase;
    color: var(--muted); text-align: left;
    border-bottom: 1px solid var(--border);
    z-index: 1;
    user-select: none;
  }
  .tbl-scroll thead th.sortable { cursor: pointer; }
  .tbl-scroll thead th.sortable:hover { color: var(--text); }
  .tbl-scroll thead th.sortable .arrow { opacity: 0.3; margin-left: 4px; font-size: 9px; }
  .tbl-scroll thead th.sortable.asc  .arrow,
  .tbl-scroll thead th.sortable.desc .arrow { opacity: 1; color: var(--gold); }
  .tbl-scroll tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
    vertical-align: middle;
  }
  .tbl-scroll tbody tr:hover { background: rgba(255,255,255,0.02); }
  .tbl-scroll tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .tbl-scroll tbody td.muted { color: var(--muted); }

  .stale-badge {
    display: inline-block;
    background: rgba(224,96,96,0.12);
    color: var(--red);
    border: 1px solid rgba(224,96,96,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    margin-left: 12px;
  }
  .stale-badge.warn { background: rgba(201,169,110,0.12); color: var(--gold); border-color: rgba(201,169,110,0.3); }

  /* ── Loading/Error ── */
  .state-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .state-title { font-family: 'Unbounded', sans-serif; font-size: 16px; color: var(--text); }
  .state-sub { color: var(--muted); font-size: 12px; text-align: center; max-width: 360px; line-height: 1.7; }
  .error-card {
    background: rgba(224,96,96,0.08); border: 1px solid rgba(224,96,96,0.2);
    border-radius: 12px; padding: 20px 24px; max-width: 400px; text-align: center;
  }
  .error-title { color: var(--red); font-weight: 600; margin-bottom: 8px; }

  .no-data { color: var(--muted); font-size: 12px; text-align: center; padding: 24px 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 4px; }
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">KEY<span>CRM</span></div>
      <div class="logo-sub">АНАЛІТИКА · БІЗНЕС</div>
    </div>

    <nav>
      <div class="nav-item active" onclick="navigate('overview')">
        <span class="nav-icon">◈</span> Огляд
      </div>
      <div class="nav-item" onclick="navigate('products')">
        <span class="nav-icon">◇</span> Товари
      </div>
      <div class="nav-item" onclick="navigate('orders')">
        <span class="nav-icon">◆</span> Замовлення
      </div>
      <div class="nav-item" onclick="navigate('sku')">
        <span class="nav-icon">◉</span> SKU-аналітика
      </div>
      <div class="nav-item" onclick="navigate('reorder')">
        <span class="nav-icon">↻</span> Реордер
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="update-info" id="update-info">
        Дані оновлено<br><span id="updated-at">—</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-area">
    <div class="state-wrap" id="loading-state">
      <div class="spinner"></div>
      <div class="state-title">Завантажуємо дані</div>
      <div class="state-sub">Підключаємось до KEYCRM та збираємо аналітику...</div>
    </div>
  </main>

</div>

<script>
// ── Token gate ───────────────────────
const _params = new URLSearchParams(location.search);
if (_params.get('key')) {
  localStorage.setItem('dt', _params.get('key'));
  history.replaceState({}, '', location.pathname + location.hash);
}
const TOKEN = localStorage.getItem('dt') || '';
const apiUrl = (path, extra) => {
  const sep = path.indexOf('?') === -1 ? '?' : '&';
  const tail = TOKEN ? `${sep}token=${encodeURIComponent(TOKEN)}` : '';
  const more = extra ? (tail ? '&' : sep) + extra : '';
  return path + tail + more;
};

let DATA = null;
let SKU_DATA = null;
let SKU_META = null;
let SKU_SORT = { col: 'velocity_30d', dir: 'desc' };
let SKU_FILTER = { search: '', status: '', category: '' };
let currentDays = 30;
let charts = {};

// ── Chart defaults ───────────────────
Chart.defaults.color = 'rgba(232,228,220,0.5)';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = 'Inter';
Chart.defaults.font.size = 11;

// ── Fetch data ───────────────────────
async function loadData(days = currentDays) {
  currentDays = days;
  showLoading();
  try {
    const res = await fetch(apiUrl(`/api/data?days=${days}`));
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Помилка сервера');
    DATA = json;
    document.getElementById('updated-at').textContent =
      (function(d){ return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); })(new Date(json.updatedAt));
    renderCurrentPage();
  } catch(e) {
    showError(e.message);
  }
}

async function loadSku(opts) {
  showLoading();
  try {
    const params = new URLSearchParams();
    if (opts && opts.reorder) params.set('reorder', 'true');
    if (SKU_FILTER.status)   params.set('status', SKU_FILTER.status);
    if (SKU_FILTER.category) params.set('category', SKU_FILTER.category);
    const url = apiUrl('/api/sku', params.toString());
    const [skuRes, metaRes] = await Promise.all([
      fetch(url),
      fetch(apiUrl('/api/sku?meta=true')),
    ]);
    const skuJson = await skuRes.json();
    const metaJson = await metaRes.json();
    if (!skuRes.ok) throw new Error(skuJson.error || 'Помилка сервера');
    SKU_DATA = skuJson.rows || [];
    SKU_META = metaJson;
    return true;
  } catch(e) {
    showError(e.message);
    return false;
  }
}

function showLoading() {
  document.getElementById('main-area').innerHTML = `
    <div class="state-wrap">
      <div class="spinner"></div>
      <div class="state-title">Завантажуємо дані</div>
      <div class="state-sub">Підключаємось до KEYCRM...</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('main-area').innerHTML = `
    <div class="state-wrap">
      <div class="error-card">
        <div class="error-title">⚠ Помилка підключення</div>
        <div class="state-sub">${msg}</div>
      </div>
    </div>`;
}

// ── Navigation ───────────────────────
let currentPage = 'overview';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderCurrentPage();
}

async function renderCurrentPage() {
  destroyCharts();
  if (currentPage === 'overview') { if (!DATA) await loadData(currentDays); renderOverview(); }
  else if (currentPage === 'products') { if (!DATA) await loadData(currentDays); renderProducts(); }
  else if (currentPage === 'orders')   { if (!DATA) await loadData(currentDays); renderOrders(); }
  else if (currentPage === 'sku')      { const ok = await loadSku(); if (ok) renderSku(); }
  else if (currentPage === 'reorder')  { const ok = await loadSku({ reorder: true }); if (ok) renderReorder(); }
}

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

// ── Helpers ──────────────────────────
const fmt = n => n >= 1e6 ? `${(n/1e6).toFixed(1)}М` : n >= 1e3 ? `${(n/1e3).toFixed(1)}к` : Math.round(n).toString();
const fmtMoney = n => `${fmt(n)} ₴`;

function pageHeader(title, sub) {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">${title}</div>
        <div class="page-sub">${sub}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="period-group">
          ${[7,30,90].map(d => `
            <button class="pbtn ${currentDays===d?'active':''}" onclick="loadData(${d})">
              ${d===7?'7 днів':d===30?'30 днів':'3 міс.'}
            </button>`).join('')}
        </div>
        <button class="refresh-btn" onclick="loadData(${currentDays})">
          <span class="ri">↺</span> Оновити
        </button>
      </div>
    </div>`;
}

// ── Overview page ────────────────────
function renderOverview() {
  const d = DATA;
  const k = d.kpi;
  document.getElementById('main-area').innerHTML = `
    ${pageHeader('Огляд бізнесу', `Дані за ${currentDays} днів · ${k.totalProducts} товарів · ${k.totalOrders} замовлень`)}

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-accent"></div>
        <div class="kpi-label">Товарів</div>
        <div class="kpi-val">${fmt(k.totalProducts)}</div>
        <div class="kpi-sub">${k.inStock} в наявності</div>
      </div>
      <div class="kpi"><div class="kpi-accent green"></div>
        <div class="kpi-label">Виручка</div>
        <div class="kpi-val">${fmtMoney(k.totalRevenue)}</div>
        <div class="kpi-sub">за ${currentDays} днів</div>
      </div>
      <div class="kpi"><div class="kpi-accent purple"></div>
        <div class="kpi-label">Замовлень</div>
        <div class="kpi-val">${fmt(k.totalOrders)}</div>
        <div class="kpi-sub">Серед. чек: ${fmtMoney(k.avgOrder)}</div>
      </div>
      <div class="kpi"><div class="kpi-accent ${k.inStock/k.totalProducts > 0.6 ? 'green':'red'}"></div>
        <div class="kpi-label">Заповненість складу</div>
        <div class="kpi-val">${k.totalProducts ? Math.round(k.inStock/k.totalProducts*100) : 0}%</div>
        <div class="kpi-sub">${k.outOfStock} поз. без залишку</div>
      </div>
    </div>

    <div class="grid-1 card">
      <div class="card-title"><span class="dot g"></span>Виручка по днях</div>
      <div class="chart-wrap"><canvas id="revChart"></canvas></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="dot"></span>Категорії (кількість товарів)</div>
        <div class="bar-list" id="cat-bars"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot p"></span>Статуси замовлень</div>
        <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
      </div>
    </div>
  `;

  // Revenue chart
  const days = d.salesByDay;

// ── SKU helpers ──────────────────────
const STATUS_PILL = { hit: 'g', slow: 'y', dead: 'r', new: 'b' };
const STATUS_LABEL = { hit: 'Хіт', slow: 'Повільний', dead: 'Мертвий', new: 'Новий' };

function staleBadge() {
  if (!SKU_META || !SKU_META.last_snapshot_date) {
    return '<span class="stale-badge">Немає снапшотів</span>';
  }
  const last = new Date(SKU_META.last_snapshot_date + 'T00:00:00Z');
  const today = new Date();
  const ageMs = today - last;
  const ageDays = Math.floor(ageMs / (24*60*60*1000));
  if (ageDays >= 2) return `<span class="stale-badge">Дані застаріли · ${ageDays}д</span>`;
  if (ageDays === 1) return `<span class="stale-badge warn">Дані вчорашні</span>`;
  return '';
}

function fmtNum(n, d) {
  if (n === null || n === undefined || n === '' || isNaN(parseFloat(n))) return '—';
  const v = parseFloat(n);
  return v.toFixed(d || 0);
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(parseFloat(n))) return '—';
  return Math.round(parseFloat(n) * 100) + '%';
}

function applySkuFilters(rows) {
  let out = rows;
  if (SKU_FILTER.search) {
    const q = SKU_FILTER.search.toLowerCase();
    out = out.filter(r =>
      ((r.name || '') + ' ' + (r.sku || '') + ' ' + (r.category_name || '')).toLowerCase().includes(q)
    );
  }
  return out;
}

function sortSku(rows) {
  const { col, dir } = SKU_SORT;
  const sign = dir === 'asc' ? 1 : -1;
  return rows.slice().sort((a, b) => {
    const av = a[col], bv = b[col];
    if (av === null || av === undefined) return 1;
    if (bv === null || bv === undefined) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sign;
    return String(av).localeCompare(String(bv)) * sign;
  });
}

function setSort(col) {
  if (SKU_SORT.col === col) SKU_SORT.dir = SKU_SORT.dir === 'asc' ? 'desc' : 'asc';
  else { SKU_SORT.col = col; SKU_SORT.dir = 'desc'; }
  renderSkuTable();
}

function renderSkuTable() {
  if (!SKU_DATA) return;
  const rows = sortSku(applySkuFilters(SKU_DATA));
  const tbody = document.getElementById('sku-tbody');
  if (!tbody) return;
  document.getElementById('sku-count').textContent = rows.length;
  document.querySelectorAll('#sku-table thead th.sortable').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.col === SKU_SORT.col) th.classList.add(SKU_SORT.dir);
  });
  tbody.innerHTML = rows.length === 0
    ? '<tr><td colspan="9" class="muted" style="text-align:center;padding:24px">Нічого не знайдено</td></tr>'
    : rows.map(r => `
      <tr>
        <td title="${r.sku || ''}">${(r.name || '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</td>
        <td class="muted">${r.category_name || '—'}</td>
        <td class="num">${fmtNum(r.current_stock)}</td>
        <td class="num">${fmtNum(r.velocity_7d, 2)}</td>
        <td class="num">${fmtNum(r.velocity_30d, 2)}</td>
        <td class="num">${fmtNum(r.days_of_supply, 0)}</td>
        <td class="num">${fmtPct(r.sell_through_30d)}</td>
        <td class="num muted">${r.age_days != null ? r.age_days + 'д' : '—'}</td>
        <td><span class="pill ${STATUS_PILL[r.status] || 'y'}">${STATUS_LABEL[r.status] || r.status || '—'}</span></td>
      </tr>`).join('');
}

function exportSkuCsv(rows, filename) {
  const cols = ['name','sku','category_name','current_stock','velocity_7d','velocity_30d','days_of_supply','sell_through_30d','age_days','status','cost'];
  const head = cols.join(',');
  const esc = v => v == null ? '' : /[",\n]/.test(String(v)) ? '"' + String(v).replace(/"/g, '""') + '"' : v;
  const body = rows.map(r => cols.map(c => esc(r[c])).join(',')).join('\n');
  const blob = new Blob(['﻿' + head + '\n' + body], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename || 'sku.csv';
  a.click();
}

        <div class="kpi-label">Повільні</div><div class="kpi-val" style="color:var(--gold)">${fmt(counts.slow)}</div>
      </div>
      <div class="kpi"><div class="kpi-accent red"></div>

    <div class="filter-bar">

      <select id="sku-status">

      <select id="sku-category">

      <span style="align-self:center;color:var(--muted);font-size:11px">Знайдено: <span id="sku-count">0</span></span>
      <button onclick="exportSkuCsv(sortSku(applySkuFilters(SKU_DATA)), 'sku-analytics.csv')">Експорт CSV</button>
    </div>

    <div class="tbl-scroll">
      <table id="sku-table">
        <thead><tr>
          <th class="sortable" data-col="name" onclick="setSort('name')">Назва <span class="arrow">▼</span></th>
          <th class="sortable" data-col="category_name" onclick="setSort('category_name')">Категорія <span class="arrow">▼</span></th>
          <th class="sortable" data-col="current_stock" onclick="setSort('current_stock')" style="text-align:right">Склад <span class="arrow">▼</span></th>
          <th class="sortable" data-col="velocity_7d" onclick="setSort('velocity_7d')" style="text-align:right">V7 <span class="arrow">▼</span></th>
          <th class="sortable" data-col="velocity_30d" onclick="setSort('velocity_30d')" style="text-align:right">V30 <span class="arrow">▼</span></th>
          <th class="sortable" data-col="days_of_supply" onclick="setSort('days_of_supply')" style="text-align:right">DoS <span class="arrow">▼</span></th>
          <th class="sortable" data-col="sell_through_30d" onclick="setSort('sell_through_30d')" style="text-align:right">Sell-through <span class="arrow">▼</span></th>

// ── Reorder page ─────────────────────

  const rows = (SKU_DATA || []).slice();

  rows.forEach(r => {
    const v30 = parseFloat(r.velocity_30d) || 0;
    r.suggested_qty = Math.max(1, Math.ceil(v30 * 60));
    r.estimated_cost = r.cost ? r.suggested_qty * parseFloat(r.cost) : null;
    if (r.estimated_cost) totalCost += r.estimated_cost;
  });

  document.getElementById('main-area').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Реордер ${staleBadge()}</div>
        <div class="page-sub">Хіти з days-of-supply &lt; 30 днів — кандидати на повторне замовлення</div>

        <div class="kpi-label">Кандидатів на реордер</div>
        <div class="kpi-val">${fmt(rows.length)}</div>

      <div class="kpi"><div class="kpi-accent"></div>
        <div class="kpi-label">Орієнтовна сума</div>

        <div class="kpi-sub">${totalCost > 0 ? 'на основі заповнених cost' : 'заповніть cost у Supabase'}</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="spacer"></div>

    </div>

        <thead><tr>
          <th>Назва</th>
          <th>Категорія</th>

          <th style="text-align:right">V30</th>

}
