# Backup cron-trigger для daily ingest.
#
# Vercel cron на Hobby плані не повністю надійний — періодично пропускає дні
# (наприклад, пропустив 16.05.2026). Цей workflow слугує резервним джерелом
# тригера: викликає /api/cron/ingest через 30 хвилин після часу Vercel cron.
#
# Ingest ідемпотентний: якщо Vercel вже встиг запустити цикл за сьогодні,
# цей виклик отримає "phase: noop, reason: already_done_today" і не зробить
# зайвої роботи. Якщо ж Vercel пропустив день — GitHub Actions підхопить.
#
# CRON_SECRET треба додати в GitHub Secrets:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: CRON_SECRET
#   Value: 07361877609204068593459c086431980327f2c69999056a06655c697858c14d

name: Backup daily ingest

on:
  schedule:
    # 03:30 UTC щодня — через 30 хвилин після Vercel cron (0 3 * * *),
    # щоб дати Vercel шанс відпрацювати першим. Hobby cron на Vercel має
    # 1-годинне вікно гнучкості, тож зазвичай запуск 03:00–03:45 UTC.
    - cron: "30 3 * * *"
  # Дозволяємо запускати вручну з UI GitHub Actions.
  workflow_dispatch:

jobs:
  trigger-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET not configured in GitHub Secrets"
            exit 1
          fi
          set +e
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            HTTP=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --max-time 90 \
              "https://keycrm-dashboard.vercel.app/api/cron/ingest?step=auto&secret=$CRON_SECRET")
            echo "HTTP $HTTP"
            cat /tmp/response.json | head -c 500
            echo ""
            if [ "$HTTP" = "200" ]; then
              echo "✓ ingest triggered successfully"
              exit 0
            fi
            echo "Attempt $i failed, waiting before retry..."
            sleep $((i * 30))
          done
          echo "::error::All 3 attempts failed"
          exit 1

      - name: Verify ingest completed
        if: success()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Дай Vercel-функції секунд 10 на завершення async роботи.
          sleep 10
          curl -s --max-time 30 \
            "https://keycrm-dashboard.vercel.app/api/cron/inspect?target=health&secret=$CRON_SECRET" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          state = d.get('ingest_state') or {}
          last_auto = d.get('last_auto_ingest') or {}
          import datetime, time
          today = datetime.datetime.utcnow().strftime('%Y-%m-%d')
          cycle_date = state.get('cycle_date')
          status = state.get('status')
          print(f'cycle_date={cycle_date} status={status}')
          print(f'last_auto={last_auto.get(\"started_at\")} status={last_auto.get(\"status\")}')
          if cycle_date != today:
              print('::warning::cycle_date is not today — ingest may not have completed')
              sys.exit(0)
          if status != 'done':
              print(f'::warning::ingest_state.status is {status}, not done')
              sys.exit(0)
          print('✓ ingest cycle completed successfully for today')
          "
